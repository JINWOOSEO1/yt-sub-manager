databases:
  - name: youtube-sub-manager-db
    databaseName: youtube_sub_manager
    user: youtube_sub_manager
    plan: basic-256mb

services:
  - type: web
    name: youtube-sub-manager-api
    runtime: python
    rootDir: backend
    plan: starter
    buildCommand: pip install -e .
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: YSM_DATABASE_URL
        fromDatabase:
          name: youtube-sub-manager-db
          property: connectionString
      - key: YSM_JWT_SECRET_KEY
        generateValue: true
      - key: YSM_WEBSUB_SECRET
        generateValue: true
      - key: YSM_GOOGLE_CLIENT_ID
        sync: false
      - key: YSM_GOOGLE_CLIENT_SECRET
        sync: false
      - key: YSM_CORS_ORIGINS
        sync: false
      - key: YSM_FIREBASE_CREDENTIALS_PATH
        sync: false
